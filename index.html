<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TWLF Portal | The Woodlands Law Firm</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">
                <i class="fa-solid fa-scale-balanced"></i>
                <span>TWLF Portal</span>
            </div>
        </div>
        <div class="header-center">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="searchInput" placeholder="Search bookmarks or the web..." autocomplete="off">
                <div class="search-engine-toggle" id="searchEngineToggle" title="Search engine">
                    <img src="https://www.google.com/favicon.ico" alt="Google" id="searchEngineIcon">
                </div>
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>
        <div class="header-right">
            <button class="header-btn" id="editModeBtn" title="Edit Mode">
                <i class="fa-solid fa-pen-to-square"></i>
            </button>
            <button class="header-btn" id="addTileBtn" title="Add Tile">
                <i class="fa-solid fa-plus"></i>
            </button>
            <button class="header-btn" id="settingsBtn" title="Settings">
                <i class="fa-solid fa-gear"></i>
            </button>
            <div class="clock" id="clock"></div>
        </div>
    </header>

    <!-- Main Grid Area -->
    <main class="main-content">
        <div class="grid-container" id="gridContainer">
            <!-- Tiles rendered by JS -->
        </div>
    </main>

    <!-- Webmix Markers (Category Tabs) -->
    <nav class="marker-bar" id="markerBar">
        <!-- Markers rendered by JS -->
    </nav>

    <!-- Add/Edit Tile Modal -->
    <div class="modal-overlay" id="tileModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Add Tile</h3>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="tileName" placeholder="Bookmark name">
                </div>
                <div class="form-group">
                    <label>URL</label>
                    <input type="url" id="tileUrl" placeholder="https://example.com">
                </div>
                <div class="form-group">
                    <label>Color</label>
                    <div class="color-picker" id="colorPicker"></div>
                </div>
                <div class="form-group">
                    <label>Icon (Font Awesome class, optional)</label>
                    <input type="text" id="tileIcon" placeholder="fa-solid fa-globe">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modalCancel">Cancel</button>
                <button class="btn btn-danger" id="modalDelete" style="display:none">Delete</button>
                <button class="btn btn-primary" id="modalSave">Save</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Settings</h3>
                <button class="modal-close" id="settingsClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>Background Color</label>
                    <input type="color" id="bgColor" value="#1a1a2e">
                </div>
                <div class="form-group">
                    <label>Background Image URL (optional)</label>
                    <input type="url" id="bgImage" placeholder="https://example.com/image.jpg">
                </div>
                <div class="form-group">
                    <label>Tile Size</label>
                    <select id="tileSize">
                        <option value="small">Small</option>
                        <option value="medium" selected>Medium</option>
                        <option value="large">Large</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="showLabels" checked> Show Tile Labels
                    </label>
                </div>
                <div class="form-group">
                    <label>Add New Category</label>
                    <div class="inline-form">
                        <input type="text" id="newCategoryName" placeholder="Category name">
                        <input type="color" id="newCategoryColor" value="#17D6E5">
                        <button class="btn btn-primary" id="addCategoryBtn">Add</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Export / Import Data</label>
                    <div class="inline-form">
                        <button class="btn btn-secondary" id="exportBtn">Export</button>
                        <button class="btn btn-secondary" id="importBtn">Import</button>
                        <input type="file" id="importFile" accept=".json" style="display:none">
                    </div>
                </div>
                <div class="form-group">
                    <button class="btn btn-danger" id="resetBtn">Reset to Defaults</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="settingsSave">Save Settings</button>
            </div>
        </div>
    </div>

    <!-- Context Menu -->
    <div class="context-menu" id="contextMenu">
        <div class="context-item" data-action="edit"><i class="fa-solid fa-pen"></i> Edit</div>
        <div class="context-item" data-action="color"><i class="fa-solid fa-palette"></i> Change Color</div>
        <div class="context-item" data-action="duplicate"><i class="fa-solid fa-clone"></i> Duplicate</div>
        <div class="context-item context-divider"></div>
        <div class="context-item context-danger" data-action="delete"><i class="fa-solid fa-trash"></i> Delete</div>
    </div>

    <!-- Notes Widget Modal -->
    <div class="modal-overlay" id="notesModal">
        <div class="modal">
            <div class="modal-header">
                <h3>Quick Notes</h3>
                <button class="modal-close" id="notesClose">&times;</button>
            </div>
            <div class="modal-body">
                <textarea id="notesArea" rows="12" placeholder="Type your notes here..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" id="notesSave">Save</button>
            </div>
        </div>
    </div>

    <!-- Todo Widget Modal -->
    <div class="modal-overlay" id="todoModal">
        <div class="modal">
            <div class="modal-header">
                <h3>To Do List</h3>
                <button class="modal-close" id="todoClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="todo-input-row">
                    <input type="text" id="todoInput" placeholder="Add a task...">
                    <button class="btn btn-primary" id="todoAddBtn">Add</button>
                </div>
                <ul class="todo-list" id="todoList"></ul>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
