<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TWLF Portal | The Woodlands Law Firm</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <img src="favicon.svg" alt="TWLF" class="logo-img">
        <span>TWLF Portal</span>
      </div>
    </div>
    <div class="header-center">
      <div class="search-bar">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchInput" placeholder="Search bookmarks or the web..." autocomplete="off">
        <div class="search-engine-toggle" id="searchEngineToggle" title="Search engine">
          <img src="https://www.google.com/favicon.ico" alt="Google" id="searchEngineIcon">
        </div>
      </div>
      <div class="search-results" id="searchResults"></div>
    </div>
    <div class="header-right">
      <div class="size-slider-wrap" title="Tile Size">
        <i class="fa-solid fa-compress size-icon-sm"></i>
        <input type="range" id="tileSizeSlider" min="60" max="140" value="90" step="2">
        <i class="fa-solid fa-expand size-icon-lg"></i>
      </div>
      <button class="header-btn" id="toggleLabels" title="Toggle Labels">
        <i class="fa-solid fa-tag"></i>
      </button>
      <button class="header-btn" id="editModeBtn" title="Edit Mode">
        <i class="fa-solid fa-pen-to-square"></i>
      </button>
      <button class="header-btn" id="addTileBtn" title="Add Tile">
        <i class="fa-solid fa-plus"></i>
      </button>
      <button class="header-btn" id="settingsBtn" title="Settings">
        <i class="fa-solid fa-gear"></i>
      </button>
      <div class="clock" id="clock"></div>
    </div>
  </header>

  <!-- Main Scrollable Page — all categories visible -->
  <main class="main-content" id="mainContent">
    <!-- Rendered by JS: section headers + tile grids for each category -->
  </main>

  <!-- Add/Edit Tile Modal -->
  <div class="modal-overlay" id="tileModal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Add Tile</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Name</label>
          <input type="text" id="tileName" placeholder="Bookmark name">
        </div>
        <div class="form-group">
          <label>URL</label>
          <input type="url" id="tileUrl" placeholder="https://example.com">
        </div>
        <div class="form-group">
          <label>Category</label>
          <select id="tileCategory"></select>
        </div>
        <div class="form-group">
          <label>Tile Size</label>
          <div class="size-picker" id="sizePicker">
            <div class="size-option selected" data-size="1x1"><div class="size-preview s1x1"></div><span>1×1</span></div>
            <div class="size-option" data-size="2x1"><div class="size-preview s2x1"></div><span>2×1</span></div>
            <div class="size-option" data-size="2x2"><div class="size-preview s2x2"></div><span>2×2</span></div>
            <div class="size-option" data-size="3x1"><div class="size-preview s3x1"></div><span>3×1</span></div>
            <div class="size-option" data-size="4x1"><div class="size-preview s4x1"></div><span>4×1</span></div>
          </div>
        </div>
        <div class="form-group">
          <label>Color</label>
          <div class="color-picker" id="colorPicker"></div>
        </div>
        <div class="form-group">
          <label>Custom Icon URL (optional — leave blank for auto logo)</label>
          <input type="url" id="tileIconUrl" placeholder="https://example.com/icon.png">
        </div>
        <div class="form-group">
          <label>Widget Type (optional)</label>
          <select id="tileWidgetType">
            <option value="">None (regular bookmark)</option>
            <option value="search">Google Search</option>
            <option value="clock">Clock</option>
            <option value="notes">Quick Notes</option>
            <option value="todo">To Do List</option>
            <option value="weather">Weather</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modalCancel">Cancel</button>
        <button class="btn btn-danger" id="modalDelete" style="display:none">Delete</button>
        <button class="btn btn-primary" id="modalSave">Save</button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settingsModal">
    <div class="modal modal-wide">
      <div class="modal-header">
        <h3>Settings</h3>
        <button class="modal-close" id="settingsClose">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Background Image URL (optional)</label>
          <input type="url" id="bgImage" placeholder="https://example.com/image.jpg">
        </div>
        <div class="form-group">
          <label>Background Color (used if no image)</label>
          <input type="color" id="bgColor" value="#0f1923">
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="showLabels" checked> Show Tile Labels</label>
        </div>
        <div class="form-group">
          <label><input type="checkbox" id="showSectionHeaders" checked> Show Section Headers</label>
        </div>
        <div class="form-group">
          <label>Add New Category</label>
          <div class="inline-form">
            <input type="text" id="newCategoryName" placeholder="Category name">
            <input type="color" id="newCategoryColor" value="#17D6E5">
            <button class="btn btn-primary" id="addCategoryBtn">Add</button>
          </div>
        </div>
        <div class="form-group">
          <label>Export / Import Data</label>
          <div class="inline-form">
            <button class="btn btn-secondary" id="exportBtn">Export</button>
            <button class="btn btn-secondary" id="importBtn">Import</button>
            <input type="file" id="importFile" accept=".json" style="display:none">
          </div>
        </div>
        <div class="form-group">
          <button class="btn btn-danger" id="resetBtn">Reset to Defaults</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" id="settingsSave">Save Settings</button>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" id="contextMenu">
    <div class="context-item" data-action="edit"><i class="fa-solid fa-pen"></i> Edit</div>
    <div class="context-item" data-action="resize"><i class="fa-solid fa-up-right-and-down-left-from-center"></i> Resize</div>
    <div class="context-item" data-action="color"><i class="fa-solid fa-palette"></i> Change Color</div>
    <div class="context-item" data-action="duplicate"><i class="fa-solid fa-clone"></i> Duplicate</div>
    <div class="context-item context-divider"></div>
    <div class="context-item context-danger" data-action="delete"><i class="fa-solid fa-trash"></i> Delete</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
